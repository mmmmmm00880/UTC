<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JST-UTC Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>時刻変換ツール</h1>
        
        <div class="tabs">
            <button id="btn-jst-to-utc" class="tab-btn active" onclick="showSection('jst-to-utc')">JST → UTC</button>
            <button id="btn-utc-to-jst" class="tab-btn" onclick="showSection('utc-to-jst')">UTC → JST</button>
        </div>

        <div id="section-jst-to-utc" class="converter-content">
            <div class="input-group">
                <label for="jst-input">日本標準時 (JST)</label>
                <input type="datetime-local" id="jst-input">
            </div>
            <div class="result-group">
                <p class="result-label">世界標準時 (UTC)</p>
                <p id="utc-result" class="result-display">-</p>
            </div>
        </div>

        <div id="section-utc-to-jst" class="converter-content" style="display: none;">
            <div class="input-group">
                <label for="utc-input">世界標準時 (UTC)</label>
                <input type="datetime-local" id="utc-input">
            </div>
            <div class="result-group">
                <p class="result-label">日本標準時 (JST)</p>
                <p id="jst-result" class="result-display">-</p>
            </div>
        </div>

        <div class="copy-section">
            <textarea id="copy-area" readonly placeholder="時刻を入力してください"></textarea>
            <button id="copy-btn" class="copy-btn" onclick="copyResult()">結果をコピー</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
