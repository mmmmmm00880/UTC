<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTC↔JST 変換ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>UTC ↔ JST 変換</h2>

    <div class="tab-menu">
        <button id="tab-jst-to-utc" class="active" onclick="switchTab('jst-to-utc')">JST → UTC</button>
        <button id="tab-utc-to-jst" onclick="switchTab('utc-to-jst')">UTC → JST</button>
    </div>

    <div id="panel-jst-to-utc" class="panel">
        <label for="jstInput">日本標準時 (JST)</label>
        <input type="datetime-local" id="jstInput">
        
        <div class="result-box">
            <label>世界標準時 (UTC)</label>
            <div id="utcResult" class="time-display"></div>
        </div>

        <textarea id="jstCopyArea" readonly></textarea>
        <button class="copy-btn" onclick="copyToClipboard('jstCopyArea')">コピー</button>
    </div>

    <div id="panel-utc-to-jst" class="panel" style="display: none;">
        <label for="utcInput">世界標準時 (UTC)</label>
        <input type="datetime-local" id="utcInput">
        
        <div class="result-box">
            <label>日本標準時 (JST)</label>
            <div id="jstResult" class="time-display"></div>
        </div>

        <textarea id="utcCopyArea" readonly></textarea>
        <button class="copy-btn" onclick="copyToClipboard('utcCopyArea')">コピー</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
